<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The terminal SPA is for logged-in users. Every /terminal/* path
         serves this same shell, which is empty until React hydrates —
         Googlebot would see it as duplicate thin content across many
         URLs. Tell crawlers not to index any of them. `follow` so the
         SPA's outbound links to marketing pages still build authority. -->
    <meta name="robots" content="noindex,follow" />
    <title>Termimal — Web Terminal</title>
    <meta name="description" content="The Termimal web terminal — sign in to access charts, macro intelligence, COT positioning, and risk research." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
